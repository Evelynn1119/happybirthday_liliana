<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Liliana 🎀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    user-select: none;
    background: radial-gradient(ellipse at 50% 0%, #f5e8d8 0%, #e8d0b8 50%, #d4b89a 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(80,40,10,0.18) 100%);
  }

  .player-label-top {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: #6a3a18;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    opacity: 0.85;
    position: relative; z-index: 10;
  }

  /* ── music box stage ── */
  .box-stage {
    position: relative;
    width: min(420px, 92vw);
    z-index: 10;
  }

  .box-img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 16px 40px rgba(80,40,10,0.3));
    border-radius: 4px;
  }

  /* ── doll video inside the box ── */
  .doll-video-wrap {
    position: absolute;
    left: 50%;
    bottom: 33%;
    width: 34%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }
  .doll-video-wrap video { display: none; }
  .doll-video-wrap canvas { width: 100%; display: block; }

  /* ── winding key hit area ── */
  .key-hit-area {
    position: absolute;
    right: 0%;
    top: 48%;
    width: 14%;
    height: 18%;
    cursor: pointer;
    border-radius: 50%;
    z-index: 5;
  }
  .key-hit-area.active::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,180,80,0.35) 0%, transparent 70%);
    animation: keyglow 0.5s ease-in-out infinite alternate;
  }
  @keyframes keyglow {
    from { opacity: 0.5; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.05); }
  }

  /* ── hint + wave dots ── */
  .wind-hint {
    margin-top: 14px;
    font-size: 14px;
    font-style: italic;
    color: #8a5a34;
    letter-spacing: 1px;
    text-align: center;
    transition: opacity 0.6s;
    position: relative; z-index: 10;
  }
  .wind-hint.hide { opacity: 0; }

  .wave-dots {
    display: flex; gap: 5px; align-items: center;
    margin-top: 10px; height: 20px;
    opacity: 0; transition: opacity 0.3s;
    position: relative; z-index: 10;
  }
  .wave-dots.show { opacity: 1; }
  .wave-dots span {
    width: 4px; background: #9a5a2a; border-radius: 3px;
    animation: wavebar 0.7s ease-in-out infinite alternate;
  }
  @keyframes wavebar { from { height: 4px; } to { height: var(--h, 16px); } }

  .ended-msg {
    font-style: italic; color: #7a4a28; font-size: 14px;
    margin-top: 10px; opacity: 0; transition: opacity 0.6s; text-align: center;
    position: relative; z-index: 10;
  }
  .ended-msg.show { opacity: 1; }
</style>
</head>
<body>

<div class="player-label-top">a little something for you 🎀</div>

<div class="box-stage">
  <img class="box-img" src="/image/musicbox(blank).png" alt="music box"/>

  <div class="doll-video-wrap">
    <video id="dollVideo" src="/video.mp4" loop muted playsinline preload="auto"></video>
    <canvas id="dollCanvas"></canvas>
  </div>

  <div class="key-hit-area" id="windBtn"></div>
</div>

<div class="wind-hint" id="windHint">hold the key to play ✦</div>

<div class="wave-dots" id="waveDots">
  <span style="--h:8px;  animation-delay:0s"></span>
  <span style="--h:16px; animation-delay:0.1s"></span>
  <span style="--h:12px; animation-delay:0.2s"></span>
  <span style="--h:18px; animation-delay:0.05s"></span>
  <span style="--h:10px; animation-delay:0.15s"></span>
  <span style="--h:14px; animation-delay:0.25s"></span>
  <span style="--h:8px;  animation-delay:0.35s"></span>
</div>

<div class="ended-msg" id="endedMsg">wind again to replay ↺</div>

<script>
// ── audio source — replace the src with your voice note URL or base64 ──
// Leave as null if no audio yet; the box still looks pretty 🎀
const AUDIO_SRC = null;

const audioEl   = AUDIO_SRC ? new Audio(AUDIO_SRC) : null;
const dollVideo = document.getElementById('dollVideo');
const windBtn   = document.getElementById('windBtn');
const windHint  = document.getElementById('windHint');
const waveDots  = document.getElementById('waveDots');
const endedMsg  = document.getElementById('endedMsg');

let isPlaying = false;

if (audioEl) audioEl.addEventListener('ended', onEnded);

function startWinding() {
  if (!audioEl) return;
  windHint.classList.add('hide');
  endedMsg.classList.remove('show');
  if (audioEl.ended) audioEl.currentTime = 0;
  audioEl.play();
  dollVideo.play();
  isPlaying = true;
  waveDots.classList.add('show');
  windBtn.classList.add('active');
}

function stopWinding() {
  if (!isPlaying) return;
  if (audioEl) audioEl.pause();
  dollVideo.pause();
  isPlaying = false;
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.remove('hide');
}

function onEnded() {
  isPlaying = false;
  dollVideo.pause(); dollVideo.currentTime = 0;
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.add('hide');
  endedMsg.classList.add('show');
}

windBtn.addEventListener('mousedown', e => { e.preventDefault(); startWinding(); });
window.addEventListener('mouseup', stopWinding);
windBtn.addEventListener('touchstart', e => { e.preventDefault(); startWinding(); }, { passive: false });
window.addEventListener('touchend', stopWinding);
window.addEventListener('touchcancel', stopWinding);

// ── canvas chroma key: removes black background from video ──
(function() {
  const video  = document.getElementById('dollVideo');
  const canvas = document.getElementById('dollCanvas');
  if (!video || !canvas) return;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function keyFrame() {
    if (video.readyState < 2) { requestAnimationFrame(keyFrame); return; }
    const w = video.videoWidth, h = video.videoHeight;
    if (w === 0) { requestAnimationFrame(keyFrame); return; }
    if (canvas.width !== w) { canvas.width = w; canvas.height = h; }
    ctx.drawImage(video, 0, 0, w, h);
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    const threshold = 40;
    for (let i = 0; i < d.length; i += 4) {
      const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
      if (brightness < threshold) {
        d[i+3] = 0;
      } else if (brightness < threshold * 2.5) {
        d[i+3] = Math.round(255 * (brightness - threshold) / (threshold * 1.5));
      }
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(keyFrame);
  }

  video.addEventListener('loadeddata', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    requestAnimationFrame(keyFrame);
  });
  if (video.readyState >= 2) requestAnimationFrame(keyFrame);
})();
</script>
</body>
</html>
