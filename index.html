<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A little something for you 🎀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f0e0d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── warm studio gradient bg ── */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, #f5e8d8 0%, #e8d0b8 50%, #d4b89a 100%);
    z-index: 0;
  }
  /* subtle vignette */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(80,40,10,0.18) 100%);
  }

  /* ════════════ RECORD SCREEN ════════════ */
  #record-screen {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 32px 24px;
  }
  #record-screen h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 24px;
    color: #4a2e1a;
    text-align: center;
    line-height: 1.4;
  }
  #record-screen p {
    font-size: 15px;
    color: #7a5a40;
    text-align: center;
    max-width: 260px;
    line-height: 1.7;
    font-style: italic;
  }

  /* small music box preview on record screen */
  .box-preview {
    width: 180px;
    opacity: 0.85;
    margin: 4px 0;
    filter: drop-shadow(0 8px 20px rgba(80,40,10,0.2));
  }

  .rec-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 35%, #d94040, #8b1a1a);
    box-shadow:
      0 0 0 5px rgba(180,80,60,0.15),
      0 4px 18px rgba(160,40,20,0.35);
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }
  .rec-btn:active { transform: scale(0.94); }
  .rec-btn.recording { animation: recpulse 1s ease-in-out infinite; }
  @keyframes recpulse {
    0%,100% { box-shadow: 0 0 0 5px rgba(180,80,60,0.15), 0 4px 18px rgba(160,40,20,0.35); }
    50%      { box-shadow: 0 0 0 14px rgba(180,80,60,0.08), 0 4px 26px rgba(160,40,20,0.5); }
  }
  .rec-btn .inner {
    width: 28px; height: 28px;
    background: white;
    border-radius: 50%;
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    transition: border-radius 0.3s, width 0.3s, height 0.3s;
  }
  .rec-btn.recording .inner { border-radius: 4px; width: 24px; height: 24px; }

  #recStatus {
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #9a6a40;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .done-btn {
    display: none;
    background: none;
    border: 1px solid rgba(120,70,30,0.4);
    color: #6a3a18;
    padding: 10px 30px;
    border-radius: 30px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    cursor: pointer;
    font-size: 15px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .done-btn:hover { background: rgba(120,70,30,0.07); border-color: #6a3a18; }
  .done-btn.visible { display: block; }

  /* ════════════ PLAYER SCREEN ════════════ */
  #player-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    position: relative; z-index: 10;
  }
  #player-screen.visible { display: flex; }

  .player-label-top {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: #6a3a18;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    opacity: 0.85;
  }

  /* ── music box stage ── */
  .box-stage {
    position: relative;
    width: min(420px, 92vw);
  }

  /* the music box image fills the stage */
  .box-img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 16px 40px rgba(80,40,10,0.3));
    border-radius: 4px;
  }

  /* ── turntable platform: positioned over the round pad inside the box ── */
  .platform {
    position: absolute;
    left: var(--pf-left, 50%);
    bottom: var(--pf-bottom, 33%);
    width: var(--pf-w, 30%);
    transform: translateX(-50%);
    perspective: 900px;            /* gives the 3D turn real depth */
  }

  /* contact shadow ellipse on the platform (static) */
  .platform .contact-shadow {
    position: absolute;
    bottom: -4%;
    left: 50%;
    width: 76%;
    height: 14%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 50%, rgba(60,30,10,0.45) 0%, rgba(60,30,10,0.15) 55%, transparent 75%);
    filter: blur(2px);
    z-index: 1;
  }

  /* the rotating element — two faces pivot around the vertical axis */
  .spinner {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    transform-origin: 50% 100%;   /* pivot at the feet */
    z-index: 2;
  }
  .spinner.spinning {
    animation: doll-spin 7s linear infinite;
  }
  @keyframes doll-spin {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
  }

  /* each face is a flat billboard; backface hidden so only the
     side currently facing us shows — front for 0–90/270–360, back for 90–270 */
  .face {
    width: 100%;
    display: block;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .face img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 5px 10px rgba(80,40,10,0.3));
  }
  /* front face defines height */
  .face.front { position: relative; transform: rotateY(0deg); }
  /* back face overlaps, flipped + shadowed to read as the figurine's back */
  .face.back {
    position: absolute;
    top: 0; left: 0;
    transform: rotateY(180deg);
  }
  .face.back img {
    transform: scaleX(-1);
    filter: brightness(0.42) saturate(0.65) drop-shadow(0 5px 10px rgba(80,40,10,0.3));
  }

  /* ── invisible winding key hit area ── */
  /* covers the key on the right side of the box */
  .key-hit-area {
    position: absolute;
    right: 0%;
    top: 48%;
    width: 14%;
    height: 18%;
    cursor: pointer;
    border-radius: 50%;
    /* outline: 2px dashed red; */ /* debug - uncomment to see */
  }

  /* key glow when active */
  .key-hit-area.active::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,180,80,0.35) 0%, transparent 70%);
    animation: keyglow 0.5s ease-in-out infinite alternate;
  }
  @keyframes keyglow {
    from { opacity: 0.5; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.05); }
  }

  /* ── hint text below ── */
  .wind-hint {
    margin-top: 14px;
    font-size: 14px;
    font-style: italic;
    color: #8a5a34;
    letter-spacing: 1px;
    text-align: center;
    transition: opacity 0.6s;
  }
  .wind-hint.hide { opacity: 0; }

  /* ── playing indicator: waveform dots ── */
  .wave-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    margin-top: 10px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .wave-dots.show { opacity: 1; }
  .wave-dots span {
    width: 4px;
    background: #9a5a2a;
    border-radius: 3px;
    animation: wavebar 0.7s ease-in-out infinite alternate;
  }
  @keyframes wavebar {
    from { height: 4px; }
    to   { height: var(--h, 16px); }
  }

  /* ── "wound down" message ── */
  .ended-msg {
    font-style: italic;
    color: #7a4a28;
    font-size: 14px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.6s;
    text-align: center;
  }
  .ended-msg.show { opacity: 1; }
</style>
</head>
<body>
<div class="bg"></div>

<!-- ══════════════ RECORD SCREEN ══════════════ -->
<div id="record-screen">
  <h1>Leave her a little something</h1>

  <!-- small preview of the music box -->
  <img class="box-preview" id="boxPreview" src="/image/musicbox(blank).png" alt="music box"/>

  <p>Record your voice. She'll wind the music box to hear it.</p>

  <button class="rec-btn" id="recBtn"><div class="inner"></div></button>
  <p id="recStatus">tap to record</p>
  <button class="done-btn" id="doneBtn">seal it with a bow →</button>
</div>

<!-- ══════════════ PLAYER SCREEN ══════════════ -->
<div id="player-screen">
  <div class="player-label-top">a little something for you 🎀</div>

  <div class="box-stage">
    <img class="box-img" id="boxImg" src="/image/musicbox(blank).png" alt="music box"/>

    <!-- doll on rotating turntable (two-faced 3D billboard) -->
    <div class="platform">
      <div class="contact-shadow"></div>
      <div class="spinner" id="turntable">
        <div class="face front"><img class="doll-src" src="/image/dolls_1.png" alt=""/></div>
        <div class="face back"><img class="doll-src" src="/image/dolls_1.png" alt=""/></div>
      </div>
    </div>

    <!-- invisible hit area over the winding key -->
    <div class="key-hit-area" id="windBtn"></div>
  </div>

  <div class="wind-hint" id="windHint">hold the key to play ✦</div>

  <div class="wave-dots" id="waveDots">
    <span style="--h:8px;  animation-delay:0s"></span>
    <span style="--h:16px; animation-delay:0.1s"></span>
    <span style="--h:12px; animation-delay:0.2s"></span>
    <span style="--h:18px; animation-delay:0.05s"></span>
    <span style="--h:10px; animation-delay:0.15s"></span>
    <span style="--h:14px; animation-delay:0.25s"></span>
    <span style="--h:8px;  animation-delay:0.35s"></span>
  </div>

  <div class="ended-msg" id="endedMsg">wind again to replay ↺</div>
</div>

<script>
// ════════════════════════════════════════════════
// If this is a baked player file (sent to friend)
// images & audio are already embedded via window.__*__
// ════════════════════════════════════════════════
if (window.__MUSICBOX_B64__) document.getElementById('boxImg').src = window.__MUSICBOX_B64__;
if (window.__MUSICBOX_B64__) document.getElementById('boxPreview').src = window.__MUSICBOX_B64__;
if (window.__DOLL_B64__)     document.querySelectorAll('.doll-src').forEach(el => el.src = window.__DOLL_B64__);
if (window.__AUDIO_B64__) {
  // boot straight to player
  window.addEventListener('DOMContentLoaded', () => {}, { once: true });
  document.getElementById('record-screen').style.display = 'none';
  const ps = document.getElementById('player-screen');
  ps.classList.add('visible');
}

// ════ load images as base64 (for embedding later) ════
let musicboxB64 = '', dollB64 = '';
(async () => {
  const toB64 = url => fetch(url)
    .then(r => r.blob())
    .then(b => new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(b); }));
  try {
    [musicboxB64, dollB64] = await Promise.all([
      toB64('/image/musicbox(blank).png'),
      toB64('/image/dolls_1.png')
    ]);
  } catch(e) { /* images already served locally */ }
})();

// ════ recording ════
let mediaRecorder, chunks = [], audioBase64 = null, audioEl;
let isRecording = false, isPlaying = false;

const recBtn     = document.getElementById('recBtn');
const doneBtn    = document.getElementById('doneBtn');
const recStatus  = document.getElementById('recStatus');
const recordScreen = document.getElementById('record-screen');
const playerScreen = document.getElementById('player-screen');

recBtn.addEventListener('click', async () => {
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const fr = new FileReader();
        fr.onload = () => {
          audioBase64 = fr.result;
          audioEl = new Audio(audioBase64);
          audioEl.addEventListener('ended', onEnded);
          doneBtn.classList.add('visible');
          recStatus.textContent = 'saved ✓  — tap to re-record';
        };
        fr.readAsDataURL(blob);
      };
      mediaRecorder.start();
      isRecording = true;
      recBtn.classList.add('recording');
      recStatus.textContent = 'recording … tap to stop';
      doneBtn.classList.remove('visible');
      audioBase64 = null;
    } catch(e) {
      recStatus.textContent = 'allow microphone access and try again';
    }
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    recBtn.classList.remove('recording');
    recStatus.textContent = 'processing …';
  }
});

// ════ seal + download ════
doneBtn.addEventListener('click', () => {
  if (!audioBase64) return;
  doneBtn.textContent = 'wrapping …';
  doneBtn.disabled = true;

  const html = buildPlayerHTML(audioBase64, musicboxB64 || '/image/musicbox(blank).png', dollB64 || '/image/dolls_1.png');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([html], { type: 'text/html' })),
    download: 'happy-birthday-liliana.html'
  });
  a.click();

  setTimeout(() => {
    doneBtn.textContent = 'seal it with a bow →';
    doneBtn.disabled = false;
    recordScreen.style.display = 'none';
    playerScreen.classList.add('visible');
    if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
  }, 500);
});

// ════ player controls ════
const turntable  = document.getElementById('turntable');
const windBtn    = document.getElementById('windBtn');
const windHint   = document.getElementById('windHint');
const waveDots   = document.getElementById('waveDots');
const endedMsg   = document.getElementById('endedMsg');

// boot with baked audio
if (window.__AUDIO_B64__) {
  audioEl = new Audio(window.__AUDIO_B64__);
  audioEl.addEventListener('ended', onEnded);
}

function startWinding() {
  if (!audioEl) return;
  windHint.classList.add('hide');
  endedMsg.classList.remove('show');
  if (audioEl.ended) audioEl.currentTime = 0;
  audioEl.play();
  isPlaying = true;
  turntable.classList.add('spinning');
  waveDots.classList.add('show');
  windBtn.classList.add('active');
}

function stopWinding() {
  if (!audioEl || !isPlaying) return;
  audioEl.pause();
  isPlaying = false;
  turntable.classList.remove('spinning');
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.remove('hide');
}

function onEnded() {
  isPlaying = false;
  turntable.classList.remove('spinning');
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.add('hide');
  endedMsg.classList.add('show');
}

windBtn.addEventListener('mousedown', e => { e.preventDefault(); startWinding(); });
window.addEventListener('mouseup', () => stopWinding());
windBtn.addEventListener('touchstart', e => { e.preventDefault(); startWinding(); }, { passive: false });
window.addEventListener('touchend', () => stopWinding());
window.addEventListener('touchcancel', () => stopWinding());

// ════ build self-contained player HTML ════
function buildPlayerHTML(audiob64, musicboxSrc, dollSrc) {
  const musicboxAttr = musicboxSrc.startsWith('data:') ? musicboxSrc : musicboxSrc;
  const dollAttr     = dollSrc.startsWith('data:')     ? dollSrc     : dollSrc;

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden; user-select: none;
    background: radial-gradient(ellipse at 50% 0%, #f5e8d8 0%, #e8d0b8 50%, #d4b89a 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(80,40,10,0.18) 100%);
  }
  .player-label-top {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 18px; color: #6a3a18; letter-spacing: 0.5px;
    margin-bottom: 16px; opacity: 0.85;
  }
  .box-stage { position: relative; width: min(420px, 92vw); }
  .box-img { width: 100%; display: block; filter: drop-shadow(0 16px 40px rgba(80,40,10,0.3)); border-radius: 4px; }
  .turntable-wrap {
    position: absolute;
    left: 34%; top: 46%;
    width: 32%;
    transform: translateX(-50%);
    transform-origin: bottom center;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .doll-img { width: 100%; filter: drop-shadow(0 4px 12px rgba(80,40,10,0.25)); transform-origin: bottom center; }
  .turntable-wrap.spinning { animation: turntable-spin 4s linear infinite; }
  @keyframes turntable-spin {
    0%   { transform: translateX(-50%) perspective(300px) rotateY(0deg); }
    100% { transform: translateX(-50%) perspective(300px) rotateY(360deg); }
  }
  .key-hit-area {
    position: absolute; right: 0%; top: 48%; width: 14%; height: 18%;
    cursor: pointer; border-radius: 50%;
  }
  .key-hit-area.active::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    background: radial-gradient(circle, rgba(220,180,80,0.35) 0%, transparent 70%);
    animation: keyglow 0.5s ease-in-out infinite alternate;
  }
  @keyframes keyglow { from{opacity:.5;transform:scale(.95)} to{opacity:1;transform:scale(1.05)} }
  .wind-hint {
    margin-top: 14px; font-size: 14px; font-style: italic;
    color: #8a5a34; letter-spacing: 1px; text-align: center; transition: opacity 0.6s;
  }
  .wind-hint.hide { opacity: 0; }
  .wave-dots { display: flex; gap: 5px; align-items: center; margin-top: 10px; height: 20px; opacity: 0; transition: opacity 0.3s; }
  .wave-dots.show { opacity: 1; }
  .wave-dots span { width: 4px; background: #9a5a2a; border-radius: 3px; animation: wavebar 0.7s ease-in-out infinite alternate; }
  @keyframes wavebar { from{height:4px} to{height:var(--h,16px)} }
  .ended-msg { font-style: italic; color: #7a4a28; font-size: 14px; margin-top: 10px; opacity: 0; transition: opacity 0.6s; text-align: center; }
  .ended-msg.show { opacity: 1; }
</style>
</head>
<body>
<div class="player-label-top">a little something for you 🎀</div>
<div class="box-stage">
  <img class="box-img" src="${musicboxAttr}" alt="music box"/>
  <div class="turntable-wrap" id="turntable">
    <img class="doll-img" src="${dollAttr}" alt=""/>
  </div>
  <div class="key-hit-area" id="windBtn"></div>
</div>
<div class="wind-hint" id="windHint">hold the key to play ✦</div>
<div class="wave-dots" id="waveDots">
  <span style="--h:8px;animation-delay:0s"></span>
  <span style="--h:16px;animation-delay:0.1s"></span>
  <span style="--h:12px;animation-delay:0.2s"></span>
  <span style="--h:18px;animation-delay:0.05s"></span>
  <span style="--h:10px;animation-delay:0.15s"></span>
  <span style="--h:14px;animation-delay:0.25s"></span>
  <span style="--h:8px;animation-delay:0.35s"></span>
</div>
<div class="ended-msg" id="endedMsg">wind again to replay ↺</div>
<script>
const audioEl = new Audio(${JSON.stringify(audiob64)});
const turntable = document.getElementById('turntable');
const windBtn   = document.getElementById('windBtn');
const windHint  = document.getElementById('windHint');
const waveDots  = document.getElementById('waveDots');
const endedMsg  = document.getElementById('endedMsg');
let isPlaying = false;
audioEl.addEventListener('ended', () => {
  isPlaying = false;
  turntable.classList.remove('spinning');
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.add('hide');
  endedMsg.classList.add('show');
});
function startWinding() {
  windHint.classList.add('hide');
  endedMsg.classList.remove('show');
  if (audioEl.ended) audioEl.currentTime = 0;
  audioEl.play();
  isPlaying = true;
  turntable.classList.add('spinning');
  waveDots.classList.add('show');
  windBtn.classList.add('active');
}
function stopWinding() {
  if (!isPlaying) return;
  audioEl.pause(); isPlaying = false;
  turntable.classList.remove('spinning');
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.remove('hide');
}
windBtn.addEventListener('mousedown', e => { e.preventDefault(); startWinding(); });
window.addEventListener('mouseup', stopWinding);
windBtn.addEventListener('touchstart', e => { e.preventDefault(); startWinding(); }, { passive: false });
window.addEventListener('touchend', stopWinding);
window.addEventListener('touchcancel', stopWinding);
<\/script>
</body>
</html>`;
}
</script>
</body>
</html>
