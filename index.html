<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday Liliana 🎀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Cormorant Garamond', serif;
    user-select: none;
    background: radial-gradient(ellipse at 50% 0%, #f5e8d8 0%, #e8d0b8 50%, #d4b89a 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(80,40,10,0.15) 100%);
  }

  /* ── top label ── */
  .top-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    color: #6a3a18;
    letter-spacing: 0.5px;
    padding: 14px 0 8px;
    opacity: 0.85;
    position: relative; z-index: 10;
    flex-shrink: 0;
  }

  /* ── music box ── */
  .box-stage {
    position: relative;
    width: min(360px, 88vw);
    flex-shrink: 0;
    z-index: 10;
    isolation: auto;
  }
  .box-img {
    width: 100%; display: block;
    filter: drop-shadow(0 10px 28px rgba(80,40,10,0.28));
    border-radius: 4px;
  }

  /* ── doll video ── */
  .doll-video-wrap {
    position: absolute;
    left: 50%;
    bottom: 38%;
    width: 34%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }
  .doll-video-wrap video { display: none; }
  .doll-video-wrap canvas { width: 100%; display: block; }

  /* ── key hit area ── */
  .key-hit-area {
    position: absolute;
    right: 0%; top: 48%;
    width: 16%; height: 20%;
    cursor: pointer; border-radius: 50%; z-index: 5;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  /* prevent long-press save dialog on the box image */
  .box-img {
    -webkit-touch-callout: none;
    pointer-events: none;
  }
  .box-stage {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .key-hit-area.active::after {
    content: '';
    position: absolute; inset: -6px; border-radius: 50%;
    background: radial-gradient(circle, rgba(220,180,80,0.4) 0%, transparent 70%);
    animation: keyglow 0.5s ease-in-out infinite alternate;
  }
  @keyframes keyglow {
    from { opacity: 0.5; transform: scale(0.93); }
    to   { opacity: 1;   transform: scale(1.07); }
  }

  /* ── hint below box ── */
  .wind-hint {
    font-size: 13px; font-style: italic;
    color: #8a5a34; letter-spacing: 1px;
    text-align: center; transition: opacity 0.6s;
    position: relative; z-index: 10;
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .wind-hint.hide { opacity: 0; }

  /* ── wave dots ── */
  .wave-dots {
    display: flex; gap: 4px; align-items: center;
    height: 18px; opacity: 0; transition: opacity 0.3s;
    position: relative; z-index: 10;
    flex-shrink: 0; padding-bottom: 4px;
  }
  .wave-dots.show { opacity: 1; }
  .wave-dots span {
    width: 3px; background: #9a5a2a; border-radius: 3px;
    animation: wavebar 0.7s ease-in-out infinite alternate;
  }
  @keyframes wavebar { from { height: 3px; } to { height: var(--h, 14px); } }

  /* ── subtitle display — shows only current line ── */
  .subtitle-box {
    width: min(360px, 88vw);
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  .subtitle-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.6;
    color: #3a2010;
    text-align: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .subtitle-text.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ended replay */
  .ended-msg {
    font-style: italic; color: #7a4a28; font-size: 13px;
    opacity: 0; transition: opacity 0.6s; text-align: center;
    position: relative; z-index: 10; flex-shrink: 0; padding: 4px 0 4px;
  }
  .ended-msg.show { opacity: 1; }

  /* ── heart burst particles ── */
  .heart-particle {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 999;
    animation: heartBurst var(--dur, 1.2s) ease-out forwards;
  }
  @keyframes heartBurst {
    0%   { transform: translate(0,0) scale(0.3) rotate(var(--r,0deg)); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--tx,0px), var(--ty,-200px)) scale(1.1) rotate(var(--r2,30deg)); opacity: 0; }
  }

  /* ── email modal overlay ── */
  .email-overlay {
    position: fixed; inset: 0;
    background: rgba(80,40,10,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .email-overlay.show { opacity: 1; pointer-events: auto; }

  .email-modal {
    background: linear-gradient(160deg, #fdf6ef 0%, #f5e8d8 100%);
    border-radius: 24px;
    padding: 36px 28px 32px;
    width: min(340px, 88vw);
    text-align: center;
    box-shadow: 0 24px 60px rgba(80,40,10,0.35);
    transform: scale(0.85) translateY(20px);
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .email-overlay.show .email-modal {
    transform: scale(1) translateY(0);
  }

  .modal-hearts {
    font-size: 32px;
    letter-spacing: 6px;
    margin-bottom: 14px;
    display: block;
    animation: floatHearts 2s ease-in-out infinite alternate;
  }
  @keyframes floatHearts { from{transform:translateY(0)} to{transform:translateY(-5px)} }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: #4a2010;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .modal-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: #9a6a40;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .email-input {
    width: 100%;
    border: 1.5px solid rgba(160,100,50,0.3);
    border-radius: 30px;
    padding: 13px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: #3a2010;
    background: rgba(255,252,248,0.9);
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .email-input:focus {
    border-color: #c9a84c;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }
  .email-input::placeholder { color: #c0a080; font-style: italic; }

  .email-send-btn {
    width: 100%;
    background: linear-gradient(135deg, #c9a84c, #9a6020);
    border: none; border-radius: 30px;
    color: white;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    padding: 14px 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(160,96,32,0.35);
  }
  .email-send-btn:active { opacity: 0.8; transform: scale(0.98); }
  .email-send-btn:disabled { opacity: 0.5; cursor: default; }

  .email-status {
    margin-top: 12px;
    font-size: 14px;
    font-style: italic;
    color: #8a5a34;
    min-height: 20px;
  }
  .modal-skip {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    color: rgba(120,70,30,0.45);
    cursor: pointer;
    font-style: italic;
    letter-spacing: 0.5px;
  }
  .modal-skip:hover { color: rgba(120,70,30,0.7); }
</style>
</head>
<body>

<div class="top-label">a little something for you 🎀</div>

<div class="box-stage">
  <img class="box-img" src="/image/musicbox(blank).png" alt="music box"/>
  <div class="doll-video-wrap">
    <video id="dollVideo" src="/video.mp4" loop muted playsinline preload="auto" autoplay></video>
    <canvas id="dollCanvas"></canvas>
  </div>
  <div class="key-hit-area" id="windBtn"></div>
</div>

<div class="wind-hint" id="windHint">hold the key to play ✦</div>
<div class="wave-dots" id="waveDots">
  <span style="--h:8px;  animation-delay:0s"></span>
  <span style="--h:14px; animation-delay:0.1s"></span>
  <span style="--h:11px; animation-delay:0.2s"></span>
  <span style="--h:16px; animation-delay:0.05s"></span>
  <span style="--h:9px;  animation-delay:0.15s"></span>
  <span style="--h:13px; animation-delay:0.25s"></span>
  <span style="--h:7px;  animation-delay:0.35s"></span>
</div>
<div class="ended-msg" id="endedMsg">wind again to replay ↺</div>

<!-- subtitle display -->
<div class="subtitle-box">
  <div class="subtitle-text" id="subtitleText"></div>
</div>

<!-- heart burst container -->
<div id="heartContainer"></div>

<!-- email modal -->
<div class="email-overlay" id="emailOverlay">
  <div class="email-modal">
    <span class="modal-hearts">🤍💗🤍</span>
    <p class="modal-title">I love you so much, Liliana 🎀</p>
    <p class="modal-sub">type your email and I'll send you<br/>the full letter 💌</p>
    <input class="email-input" id="emailInput" type="email" placeholder="your email" autocomplete="email"/>
    <button class="email-send-btn" id="emailSendBtn">send it to me ✦</button>
    <p class="email-status" id="emailStatus"></p>
    <span class="modal-skip" id="modalSkip">maybe later ↺</span>
  </div>
</div>

<script>
// ── caption cues — transcribed by Whisper from the actual voice note ──
const CUES = [
  { t: 0.0,   text: "Dear Liliana," },
  { t: 2.2,   text: "it's really really nice to be your friend." },
  { t: 4.2,   text: "First of all, I miss you so so much." },
  { t: 5.8,   text: "I can't believe how fast time has passed." },
  { t: 8.5,   text: "I still remember the first day I met you outside the bathroom," },
  { t: 11.0,  text: "and honestly, I really do consider you one of my best friend and sister." },
  { t: 17.5,  text: "I know long-distance friendships can be hard," },
  { t: 20.2,  text: "but I hope you always know that I'll be here for you," },
  { t: 23.4,  text: "no matter where we are or how much time passed." },
  { t: 27.1,  text: "I'll always be cheering for you and rooting for you." },
  { t: 30.5,  text: "And I just want to say that I really really love you" },
  { t: 33.8,  text: "and I truly cherish you as a friend and more —" },
  { t: 36.5,  text: "maybe like a family member even." },
  { t: 39.3,  text: "You make my life ten times better" },
  { t: 41.5,  text: "and I honestly can't imagine my life without you." },
  { t: 45.0,  text: "When I was in New York, and even now," },
  { t: 47.5,  text: "you've always been one of my closest friends" },
  { t: 49.5,  text: "and the one that's always been on my side." },
  { t: 51.2,  text: "I want you to be at my wedding." },
  { t: 53.2,  text: "I want you to be one of my bridesmaid." },
  { t: 55.4,  text: "I want you to be part of every important chapter in my life." },
  { t: 58.8,  text: "I'm getting emotional just saying this," },
  { t: 61.0,  text: "but I just really miss you." },
  { t: 63.0,  text: "You're such a caring, loyal person," },
  { t: 66.1,  text: "and also really really strong." },
  { t: 67.9,  text: "You always show up for the people you love and support," },
  { t: 71.0,  text: "and I adore that about you so so much." },
  { t: 73.9,  text: "I'm so proud of you for buying the house," },
  { t: 76.5,  text: "building your life in New York" },
  { t: 78.5,  text: "and becoming the person you always wanted to be." },
  { t: 82.9,  text: "Please never stop updating me on your crazy stories" },
  { t: 87.5,  text: "and your life in New York," },
  { t: 92.8,  text: "because it always makes me feel like I'm closer to you." },
  { t: 97.5,  text: "Happy birthday, Liliana." },
  { t: 99.5,  text: "I love you so much" },
  { t: 100.6, text: "and I wish you the best year ahead. 🎀" },
];

// ── subtitle element ──
const subtitleEl = document.getElementById('subtitleText');

// ── audio ──
const AUDIO_SRC = '/voicenote.m4a';
const audioEl  = new Audio(AUDIO_SRC);
const dollVideo    = document.getElementById('dollVideo');
const windBtn      = document.getElementById('windBtn');
const windHint     = document.getElementById('windHint');
const waveDots     = document.getElementById('waveDots');
const endedMsg     = document.getElementById('endedMsg');
const emailOverlay = document.getElementById('emailOverlay');
const emailInput   = document.getElementById('emailInput');
const emailSendBtn = document.getElementById('emailSendBtn');
const emailStatus  = document.getElementById('emailStatus');
const modalSkip    = document.getElementById('modalSkip');
const heartContainer = document.getElementById('heartContainer');

let isPlaying = false;
let lastCueIdx = -1;

// ── timeupdate → subtitle display ──
audioEl.addEventListener('timeupdate', () => {
  const t = audioEl.currentTime;
  let cur = -1;
  for (let i = 0; i < CUES.length; i++) {
    if (t >= CUES[i].t) cur = i;
  }
  if (cur === lastCueIdx) return;
  lastCueIdx = cur;

  if (cur < 0) { subtitleEl.classList.remove('show'); return; }

  // fade out → swap text → fade in
  subtitleEl.classList.remove('show');
  setTimeout(() => {
    subtitleEl.textContent = CUES[cur].text;
    subtitleEl.classList.add('show');
  }, 200);
});

audioEl.addEventListener('ended', onEnded);

function startWinding() {
  windHint.classList.add('hide');
  endedMsg.classList.remove('show');
  if (audioEl.ended) { audioEl.currentTime = 0; lastCueIdx = -1; subtitleEl.classList.remove('show'); }
  audioEl.play();
  dollVideo.play();
  isPlaying = true;
  waveDots.classList.add('show');
  windBtn.classList.add('active');
}

function stopWinding() {
  if (!isPlaying) return;
  audioEl.pause();
  dollVideo.pause();
  isPlaying = false;
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.remove('hide');
}

function onEnded() {
  isPlaying = false;
  dollVideo.pause(); dollVideo.currentTime = 0;
  waveDots.classList.remove('show');
  windBtn.classList.remove('active');
  windHint.classList.add('hide');
  endedMsg.classList.add('show');
  subtitleEl.classList.remove('show');
  burstHearts();
  setTimeout(() => emailOverlay.classList.add('show'), 900);
}


// ── heart burst ──
function burstHearts() {
  const emojis = ['💗','🤍','💕','💖','🩷','💝','🌸'];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 * i) / 28 + (Math.random() - 0.5) * 0.4;
    const dist  = 120 + Math.random() * 200;
    const dur   = 0.9 + Math.random() * 0.8;
    const size  = 20 + Math.random() * 22;
    el.style.cssText = `
      left:${cx}px; top:${cy}px;
      font-size:${size}px;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist - 60}px;
      --r:${(Math.random()-0.5)*40}deg;
      --r2:${(Math.random()-0.5)*80}deg;
      --dur:${dur}s;
      animation-delay:${Math.random()*0.3}s;
    `;
    heartContainer.appendChild(el);
    setTimeout(() => el.remove(), (dur + 0.4) * 1000);
  }
}

// ── email send ──
emailSendBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  if (!email || !email.includes('@')) {
    emailStatus.textContent = 'please enter a valid email ✦';
    return;
  }
  emailSendBtn.disabled = true;
  emailStatus.textContent = 'sending…';
  try {
    const res = await fetch('/api/send-letter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (res.ok) {
      emailStatus.textContent = '💌 sent! check your inbox';
      emailInput.value = '';
      setTimeout(() => emailOverlay.classList.remove('show'), 2500);
    } else {
      emailStatus.textContent = 'something went wrong — try again';
      emailSendBtn.disabled = false;
    }
  } catch {
    emailStatus.textContent = 'something went wrong — try again';
    emailSendBtn.disabled = false;
  }
});

// ── skip / close modal ──
modalSkip.addEventListener('click', () => emailOverlay.classList.remove('show'));

windBtn.addEventListener('mousedown', e => { e.preventDefault(); startWinding(); });
window.addEventListener('mouseup', stopWinding);
windBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); startWinding(); }, { passive: false });
window.addEventListener('touchend', stopWinding);
window.addEventListener('touchcancel', stopWinding);
// block long-press "save image" dialog on the whole stage
document.querySelector('.box-stage').addEventListener('contextmenu', e => e.preventDefault());
document.querySelector('.key-hit-area').addEventListener('contextmenu', e => e.preventDefault());

// ── canvas green-screen chroma removal ──
(function() {
  const video  = document.getElementById('dollVideo');
  const canvas = document.getElementById('dollCanvas');
  if (!video || !canvas) return;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  function keyFrame() {
    if (video.readyState < 2) { requestAnimationFrame(keyFrame); return; }
    const w = video.videoWidth, h = video.videoHeight;
    if (!w) { requestAnimationFrame(keyFrame); return; }
    if (canvas.width !== w) { canvas.width = w; canvas.height = h; }
    ctx.drawImage(video, 0, 0, w, h);
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      // green screen: green channel dominates over red and blue
      const isGreen = g > 80 && g > r * 1.4 && g > b * 1.4;
      if (isGreen) {
        d[i+3] = 0; // fully transparent
      } else {
        // soft feather at green edges
        const greenness = Math.max(0, (g - Math.max(r, b)) - 30);
        if (greenness > 0) d[i+3] = Math.max(0, 255 - greenness * 5);
      }
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(keyFrame);
  }

  video.addEventListener('loadeddata', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    requestAnimationFrame(keyFrame);
  });
  if (video.readyState >= 2) requestAnimationFrame(keyFrame);
})();
</script>
</body>
</html>
